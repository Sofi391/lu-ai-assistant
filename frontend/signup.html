<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - LU AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>Join LU AI</h1>
                <p>Create your account to start chatting with AI</p>
            </div>
            
            <form id="signup-form" class="auth-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required>
                </div>

                <div class="form-group">
                    <label for="full_name">Full Name (Optional)</label>
                    <input type="text" id="full_name" name="full_name" placeholder="Enter your full name">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Min. 8 characters" required minlength="8">
                    <small class="input-hint">Must be at least 8 characters</small>
                </div>

                <div class="form-group">
                    <label for="confirm_password">Confirm Password</label>
                    <input type="password" id="confirm_password" name="confirm_password" placeholder="Re-enter your password" required>
                </div>

                <button type="submit" class="btn-primary btn-full" id="signup-btn">
                    <span class="btn-text">Create Account</span>
                    <span class="btn-loading" style="display: none;">Creating...</span>
                </button>
            </form>

            <div id="error-message" class="error-message" style="display: none;"></div>
            <div id="success-message" class="success-message" style="display: none;"></div>

            <div class="auth-footer">
                <p>Already have an account? <a href="login.html">Login here</a></p>
                <p><a href="index.html">← Back to home</a></p>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        // Check if already logged in
        if (localStorage.getItem('lu_token')) {
            window.location.href = 'chat.html';
        }

        // Get form and add submit event listener
        const signupForm = document.getElementById('signup-form');

        if (signupForm) {
            signupForm.addEventListener('submit', async (e) => {
                e.preventDefault();

                // Get form values
                const email = document.getElementById('email').value.trim();
                const fullName = document.getElementById('full_name').value.trim();
                const password = document.getElementById('password').value;
                const confirmPassword = document.getElementById('confirm_password').value;
                const signupBtn = document.getElementById('signup-btn');

                // Hide any previous messages
                hideMessages();

                // Validation
                if (!email || !password) {
                    showError('Email and password are required');
                    return;
                }

                if (password.length < 8) {
                    showError('Password must be at least 8 characters');
                    return;
                }

                if (password !== confirmPassword) {
                    showError('Passwords do not match');
                    return;
                }

                // Show loading state
                setLoading(signupBtn, true);

                try {
                    // Make API request to your signup endpoint
                    const response = await fetch('http://localhost:8000/signup/', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            email: email,
                            password: password,
                            full_name: fullName
                        })
                    });

                    const data = await response.json();

                    if (response.ok) {
                        // Success response from your view: {"msg": "User created successfully"}
                        showSuccess(data.msg || 'Account created successfully! Redirecting to login...');

                        // Redirect to login page after success
                        setTimeout(() => {
                            window.location.href = 'login.html';
                        }, 1500);
                    } else {
                        // Handle error responses
                        if (response.status === 400) {
                            showError(data.error || 'User already exists or invalid data');
                        } else if (response.status === 500) {
                            showError(data.error || 'Server error. Please try again later');
                        } else {
                            showError('Signup failed. Please try again');
                        }
                        setLoading(signupBtn, false);
                    }
                } catch (error) {
                    console.error('Signup error:', error);
                    showError('Connection error. Please check your network');
                    setLoading(signupBtn, false);
                }
            });
        }

        // Helper functions (can be removed if they're already in auth.js, but included here for completeness)
        function setLoading(button, loading) {
            const btnText = button.querySelector('.btn-text');
            const btnLoading = button.querySelector('.btn-loading');

            if (btnText && btnLoading) {
                if (loading) {
                    button.disabled = true;
                    btnText.style.display = 'none';
                    btnLoading.style.display = 'inline';
                } else {
                    button.disabled = false;
                    btnText.style.display = 'inline';
                    btnLoading.style.display = 'none';
                }
            }
        }

        function showError(message) {
            const errorDiv = document.getElementById('error-message');
            if (errorDiv) {
                errorDiv.textContent = message;
                errorDiv.style.display = 'block';

                // Auto-hide after 5 seconds
                setTimeout(() => {
                    if (errorDiv.style.display === 'block') {
                        errorDiv.style.display = 'none';
                    }
                }, 5000);
            }
        }

        function showSuccess(message) {
            const successDiv = document.getElementById('success-message');
            if (successDiv) {
                successDiv.textContent = message;
                successDiv.style.display = 'block';

                // Auto-hide after 5 seconds
                setTimeout(() => {
                    if (successDiv.style.display === 'block') {
                        successDiv.style.display = 'none';
                    }
                }, 5000);
            }
        }

        function hideMessages() {
            const errorDiv = document.getElementById('error-message');
            const successDiv = document.getElementById('success-message');

            if (errorDiv) errorDiv.style.display = 'none';
            if (successDiv) successDiv.style.display = 'none';
        }
    </script>
</body>
</html>
